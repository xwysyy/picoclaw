services:
  # ─────────────────────────────────────────────
  # X-Claw Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm x-claw-agent -m "Hello"
  # ─────────────────────────────────────────────
  x-claw-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      network: host
      args:
        HTTP_PROXY: http://127.0.0.1:7890
        HTTPS_PROXY: http://127.0.0.1:7890
        NO_PROXY: localhost,127.0.0.1,::1
        http_proxy: http://127.0.0.1:7890
        https_proxy: http://127.0.0.1:7890
        no_proxy: localhost,127.0.0.1,::1
    container_name: x-claw-agent
    network_mode: host
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ../config/config.json:/home/xclaw/.x-claw/config.json:ro
      - x-claw-workspace:/home/xclaw/.x-claw/workspace
    environment:
      TZ: Asia/Shanghai
      HTTP_PROXY: http://127.0.0.1:7890
      HTTPS_PROXY: http://127.0.0.1:7890
      NO_PROXY: localhost,127.0.0.1,::1
      http_proxy: http://127.0.0.1:7890
      https_proxy: http://127.0.0.1:7890
      no_proxy: localhost,127.0.0.1,::1
      ALL_PROXY: socks5://127.0.0.1:7890
      all_proxy: socks5://127.0.0.1:7890
    command: ["agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # X-Claw Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml up x-claw-gateway
  # ─────────────────────────────────────────────
  x-claw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      network: host
      args:
        HTTP_PROXY: http://127.0.0.1:7890
        HTTPS_PROXY: http://127.0.0.1:7890
        NO_PROXY: localhost,127.0.0.1,::1
        http_proxy: http://127.0.0.1:7890
        https_proxy: http://127.0.0.1:7890
        no_proxy: localhost,127.0.0.1,::1
    container_name: x-claw-gateway
    network_mode: host
    restart: unless-stopped
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      # Configuration file
      - ../config/config.json:/home/xclaw/.x-claw/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - x-claw-workspace:/home/xclaw/.x-claw/workspace
    environment:
      TZ: Asia/Shanghai
      HTTP_PROXY: http://127.0.0.1:7890
      HTTPS_PROXY: http://127.0.0.1:7890
      NO_PROXY: localhost,127.0.0.1,::1
      http_proxy: http://127.0.0.1:7890
      https_proxy: http://127.0.0.1:7890
      no_proxy: localhost,127.0.0.1,::1
      ALL_PROXY: socks5://127.0.0.1:7890
      all_proxy: socks5://127.0.0.1:7890
    command: ["gateway"]

volumes:
  x-claw-workspace:
    name: x-claw-workspace
