services:
  # ─────────────────────────────────────────────
  # X-Claw Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm x-claw-agent -m "Hello"
  # ─────────────────────────────────────────────
  x-claw-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: x-claw-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.x-claw/config.json:ro
      - x-claw-workspace:/root/.x-claw/workspace
      - x-claw-npm-cache:/root/.npm # npm cache for faster MCP server installs
    command: ["agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # X-Claw Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  x-claw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: x-claw-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.x-claw/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - x-claw-workspace:/root/.x-claw/workspace
      # NPM cache for faster MCP server installs
      - x-claw-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  x-claw-workspace:
    name: x-claw-workspace
  x-claw-npm-cache: # Cache npm packages to speed up MCP server installations
    name: x-claw-npm-cache
