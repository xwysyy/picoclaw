name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem-motivation
    attributes:
      label: Problem / Motivation
      description: >
        Describe the problem you are trying to solve or the motivation behind
        this feature request. A clear explanation helps us understand the context.
      placeholder: I'm always frustrated when ...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see implemented.
      placeholder: It would be great if X-Claw could ...
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: >
        Describe any alternative solutions or features you've considered (optional).
      placeholder: I also thought about ...
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: >
        Add any other context, screenshots, or references that may help (optional).
    validations:
      required: false
