name: Bug Report
description: Report a bug in X-Claw
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: X-Claw version or commit hash where you encountered the bug.
      placeholder: e.g. v0.1.0 or commit hash
    validations:
      required: true

  - type: dropdown
    id: run-mode
    attributes:
      label: Run Mode
      description: Which mode were you running X-Claw in?
      options:
        - Gateway
        - Agent
        - Both
    validations:
      required: true

  - type: dropdown
    id: channel
    attributes:
      label: Channel
      description: Which channel were you using?
      options:
        - Feishu
        - Telegram
        - Discord
        - Slack
        - WeChat
        - Other
        - N/A
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure X-Claw with ...
        2. Send a message ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output (optional). Please redact any sensitive information.
      render: shell
    validations:
      required: false

  - type: textarea
    id: configuration
    attributes:
      label: Configuration
      description: >
        Relevant configuration snippets (optional).
        Please make sure to redact API keys, tokens, and other secrets before pasting.
      render: json
    validations:
      required: false
